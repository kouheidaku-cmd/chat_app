<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英会話 - スタート画面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .mode-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .mode-card:active {
            transform: scale(0.98);
        }

        .mode-card:hover {
            border-color: #007bff;
        }

        .mode-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .mode-title {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 5px;
        }

        .mode-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }

        .start-btn {
            margin-top: 10px;
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,123,255,0.3);
        }

        /*切り替え用の非表示クラス、このクラスを持つやつは画面から見えなくなる*/
        .hidden{
            display:none !important;
        }

    </style>
</head>
<body>

    <div id="main-menu" class="container">
        <h1>AI英会話へようこそ</h1>

        <div id="name-area"></div>

        <div class="mode-card" onclick="startChat('freetalk')">
            <div class="mode-icon">💬</div>
            <div class="mode-title">フリートーク</div>
            <div class="mode-desc">好きな話題で自由に会話しましょう。<br>練習のハードルが低く、リラックスして話せます。</div>
        </div>

        <div class="mode-card" onclick="showRoleplaySelect()">
            <div class="mode-icon">🧑‍⚕️</div>
            <div class="mode-title">ロールプレイ</div>
            <div class="mode-desc">様々な場面での実戦的な英会話力を身につけましょう。</div>
        </div>
    </div>

    <div id="roleplay-menu" class="container hidden"><!--これはcontainerとhiddenの二つのクラスを持つ-->
        <h1>シナリオを選択</h1>

        <div id="scenario-list">
            <p>シナリオを読み込み中</p>
        </div>

        <button onclick="showMainMenu()" style="width: 100%";padding: 15px;margin-top: 10px;background:#6c757d; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;">
            🔙 戻る
        </button>
    </div>

    <script>
        function dofreetalk() {
            // chat.htmlにモード情報を付けて遷移
            window.location.href = `/chat?mode=freetalk`;
        }
        function showRoleplaySelect(){
            document.getElementById("main-menu").classList.add("hidden");//画面の切り替えは要はクラスの付け替え
            document.getElementById("roleplay-menu").classList.remove("hidden");
            loadScenarios()
        }
        function showMainMenu(){
            document.getElementById("main-menu").classList.remove("hidden");
            document.getElementById("roleplay-menu").classList.add("hidden");
        }
        function startChat(mode){
            window.location.href=`chat?mode=${mode}`;
        }
        async function loadScenarios() {
            // 1. JSONファイルを読み込む
            const response = await fetch('/static/scenarios.json');
            const scenarios = await response.json();
            
            // 2. ボタンを並べたい場所（親要素）を取得
            const scenarioList = document.getElementById('scenario-list');
            scenarioList.innerHTML = ''; // 中身を一度空にする

            // 3. JSONのデータ分だけループを回す
            Object.keys(scenarios).forEach(key => {
                const item = scenarios[key];

                // 4. 新しい div (mode-card) を作成
                const card = document.createElement('div');
                card.className = 'mode-card';
                
                // 5. クリックした時の動作を設定
                card.onclick = () => {
                    startChat(key)
                };

                // 6. カードの中身を組み立てる
                card.innerHTML = `
                    <div class="mode-icon">${item.icon}</div>
                    <div class="mode-title">${item.title}</div>
                    <div class="mode-desc">${item.description}</div>
                `;

                // 7. 親要素に追加する
                scenarioList.appendChild(card);
            });
        }

        window.onload = function() {
            // localStorage.getItem('保存した時の名前')
            const storedName = localStorage.getItem('user_name');
            
            if (storedName) {
                // 画面上の要素（例：<span id="name-area">）に表示させる
                document.getElementById('name-area').innerText = storedName;
            } else {
                // もしデータがなければ、未ログインなのでログイン画面へ追い返す
                window.location.href = "/login";
            }
        };
    </script>

</body>
</html>
