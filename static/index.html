<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英会話 - スタート画面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .mode-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .mode-card:active {
            transform: scale(0.98);
        }

        .mode-card:hover {
            border-color: #007bff;
        }

        .mode-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .mode-title {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 5px;
        }

        .mode-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }

        .start-btn {
            margin-top: 10px;
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,123,255,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI英会話へようこそ</h1>

    <div class="mode-card" onclick="selectMode('freetalk')">
        <div class="mode-icon">💬</div>
        <div class="mode-title">フリートーク</div>
        <div class="mode-desc">好きな話題で自由に会話しましょう。<br>練習のハードルが低く、リラックスして話せます。</div>
    </div>

    <div class="mode-card" onclick="selectMode('roleplay')">
        <div class="mode-icon">☕</div>
        <div class="mode-title">ロールプレイ (カフェ)</div>
        <div class="mode-desc">カフェの店員さんと英会話。<br>注文から支払いまで、実践的な流れを練習します。</div>
    </div>
</div>

<script>
    function selectMode(mode) {
        // chat.htmlにモード情報を付けて遷移
        window.location.href = `/chat?mode=${mode}`;
    }
</script>

</body>
</html>
