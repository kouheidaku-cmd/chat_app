<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chat App - Login</title>
</head>
<body>
    <h1>ログイン / 新規登録</h1>
    
    <div id="login-section">
        <input type="text" id="username-input" placeholder="ユーザー名を入力">
        <input type="text" id="password-input" placeholder="passwordを入力">
        <button onclick="login()">ログイン</button>
    </div>

    <div id="signup-section">
        <input type="text" id="newusername-input" placeholder="ユーザー名を入力">
        <input type="text" id="newpassword-input" placeholder="passwordを入力">
        <button onclick="signup()">サインアップ</button>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
