<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Chat App - Login</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #333;
        }

        h1 {
            margin-bottom: 2rem;
            color: #2c3e50;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .auth-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
            width: 90%;
        }

        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #7f8c8d;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input {
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-weight: bold;
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }

        /* ログインとサインアップで色を少し分ける */
        #signup-section button {
            background-color: #2ecc71;
        }
        #signup-section button:hover {
            background-color: #27ae60;
        }

        @media (max-width: 600px) {
            .auth-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1>English Learning Chat</h1>
    
    <div class="auth-container">
        <div id="login-section" class="auth-card">
            <h2>ログイン</h2>
            <input type="text" id="username-input" placeholder="ユーザー名を入力">
            <input type="password" id="password-input" placeholder="パスワードを入力">
            <button onclick="login()">ログイン</button>
        </div>

        <div id="signup-section" class="auth-card">
            <h2>新規登録</h2>
            <input type="text" id="newusername-input" placeholder="ユーザー名を入力">
            <input type="password" id="newpassword-input" placeholder="パスワードを入力">
            <button onclick="signup()">サインアップ</button>
        </div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
